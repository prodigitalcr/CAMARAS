<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CamViewer Pro - Sistema de Monitoreo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .video-overlay { background: linear-gradient(0deg, rgba(0,0,0,0.8) 0%, transparent 100%); }
        .recording-dot { animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
        video { background: #000; object-fit: cover; width: 100%; height: 100%; border-radius: 1rem; }
        .cam-card { transition: all 0.3s ease; }
        .cam-card:hover { transform: translateY(-2px); border-color: rgba(16, 185, 129, 0.5); }
        /* Fix para iOS: asegura que el video no se escape del contenedor */
        .video-container { position: relative; overflow: hidden; border-radius: 1rem; }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen font-sans overflow-x-hidden">

    <div id="app">
        <!-- Pantalla de Carga Inicial -->
        <div class="flex items-center justify-center min-h-screen">
            <div class="flex flex-col items-center gap-4">
                <div class="animate-spin rounded-full h-12 w-12 border-t-2 border-emerald-500"></div>
                <p class="text-slate-500 text-sm animate-pulse">Iniciando sistema seguro...</p>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, collection, onSnapshot, deleteDoc, serverTimestamp, addDoc, query, where, getDocs, writeBatch } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // CONFIGURACIÓN DE FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyBpbTRTUWomLgUqnL46nepKnXZQIPRimlI",
            authDomain: "camaras-757d8.firebaseapp.com",
            projectId: "camaras-757d8",
            storageBucket: "camaras-757d8.firebasestorage.app",
            messagingSenderId: "370746294800",
            appId: "1:370746294800:web:77034554f64eee02aa8095"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const APP_ID = "camaras-757d8";

        let currentUser = null;
        let accountId = "";
        let mode = null;
        let activeStream = null;
        let peerConnections = {};

        const iceServers = { 
            iceServers: [
                { urls: ["stun:stun.l.google.com:19302", "stun:stun1.l.google.com:19302"] },
                { urls: "stun:stun.services.mozilla.com" }
            ] 
        };
        const appDiv = document.getElementById('app');

        // --- NAVEGACIÓN ---
        function navigate() {
            if (!currentUser) return renderLoading();
            if (!accountId) return renderLogin();
            if (!mode) return renderModeSelection();
            mode === 'camera' ? renderCameraMode() : renderViewerMode();
        }

        function renderLoading() {
            appDiv.innerHTML = `<div class="flex items-center justify-center min-h-screen"><div class="animate-spin rounded-full h-12 w-12 border-t-2 border-emerald-500"></div></div>`;
        }

        function renderLogin() {
            appDiv.innerHTML = `
                <div class="min-h-screen flex items-center justify-center p-4">
                    <div class="bg-slate-900 p-8 rounded-3xl border border-slate-800 w-full max-w-md shadow-2xl">
                        <div class="flex justify-center mb-6 text-emerald-500"><i data-lucide="shield" class="w-16 h-16"></i></div>
                        <h1 class="text-3xl font-bold text-center mb-2 text-white tracking-tight">CamViewer Pro</h1>
                        <p class="text-slate-400 text-center mb-8 text-sm">Control de Seguridad Residencial</p>
                        <input id="accInput" type="text" placeholder="CÓDIGO DE RED" class="w-full bg-slate-950 border border-slate-700 p-4 rounded-xl mb-4 text-center text-2xl font-bold tracking-[0.3em] text-emerald-400 outline-none uppercase focus:border-emerald-500 transition-all">
                        <button onclick="window.join()" class="w-full bg-emerald-600 hover:bg-emerald-500 p-4 rounded-xl font-bold text-lg shadow-lg shadow-emerald-900/20 transition-all active:scale-95">ACCEDER AL PANEL</button>
                    </div>
                </div>`;
            lucide.createIcons();
        }

        function renderModeSelection() {
            appDiv.innerHTML = `
                <div class="min-h-screen flex flex-col items-center justify-center p-6 gap-6">
                    <div class="text-center mb-4">
                        <p class="text-slate-500 text-xs uppercase font-bold tracking-widest mb-1">Terminal de Red</p>
                        <h2 class="text-3xl font-mono text-emerald-400 font-bold">${accountId}</h2>
                    </div>
                    <div class="grid grid-cols-1 gap-4 w-full max-w-sm">
                        <button id="btn-viewer" class="bg-slate-900 p-8 rounded-3xl border border-slate-800 hover:border-emerald-500 transition-all flex items-center gap-6 group">
                            <div class="bg-emerald-500/10 p-4 rounded-2xl group-hover:scale-110 transition-transform"><i data-lucide="monitor-smartphone" class="text-emerald-500 w-10 h-10"></i></div>
                            <div class="text-left"><p class="font-bold text-xl text-white">Visualizador</p><p class="text-xs text-slate-500">Monitor Maestro</p></div>
                        </button>
                        <button id="btn-camera" class="bg-slate-900 p-8 rounded-3xl border border-slate-800 hover:border-rose-500 transition-all flex items-center gap-6 group">
                            <div class="bg-rose-500/10 p-4 rounded-2xl group-hover:scale-110 transition-transform"><i data-lucide="camera" class="text-rose-500 w-10 h-10"></i></div>
                            <div class="text-left"><p class="font-bold text-xl text-white">Transmisor</p><p class="text-xs text-slate-500">Modo Cámara</p></div>
                        </button>
                    </div>
                    <button onclick="window.logout()" class="mt-8 text-slate-500 hover:text-rose-400 transition-colors flex items-center gap-2 text-sm"><i data-lucide="log-out" class="w-4 h-4"></i> Desconectar Red</button>
                </div>`;
            lucide.createIcons();
            
            // Forzar interacción de usuario para iOS
            document.getElementById('btn-viewer').addEventListener('click', () => window.setMode('viewer'));
            document.getElementById('btn-camera').addEventListener('click', () => window.setMode('camera'));
        }

        function renderCameraMode() {
            appDiv.innerHTML = `
                <div class="min-h-screen bg-black flex flex-col relative overflow-hidden">
                    <video id="localVideo" autoplay playsinline webkit-playsinline muted class="w-full h-full"></video>
                    <div class="absolute inset-0 video-overlay p-8 flex flex-col justify-between">
                        <div class="flex justify-between items-center">
                            <div class="flex items-center gap-3 bg-black/40 backdrop-blur-md px-4 py-2 rounded-full border border-white/10">
                                <div class="w-3 h-3 bg-rose-600 rounded-full recording-dot shadow-[0_0_10px_rgba(225,29,72,0.8)]"></div>
                                <span class="text-white font-bold text-xs tracking-widest uppercase">En vivo</span>
                            </div>
                        </div>
                        <div class="flex justify-center pb-10">
                            <button onclick="window.exitMode()" class="bg-white/10 p-8 rounded-full backdrop-blur-2xl border border-white/20 hover:bg-rose-600/40 transition-all shadow-2xl active:scale-90">
                                <i data-lucide="power" class="text-white w-10 h-10"></i>
                            </button>
                        </div>
                    </div>
                </div>`;
            lucide.createIcons();
            startCameraStream();
        }

        function renderViewerMode() {
            appDiv.innerHTML = `
                <div class="min-h-screen flex flex-col">
                    <header class="p-4 bg-slate-900 border-b border-slate-800 flex justify-between items-center sticky top-0 z-50 backdrop-blur-xl bg-opacity-80">
                        <div class="flex items-center gap-3">
                            <div class="bg-emerald-500/20 p-2 rounded-lg"><i data-lucide="shield" class="text-emerald-500 w-5 h-5"></i></div>
                            <div>
                                <h1 class="font-bold text-sm leading-tight">RED: ${accountId}</h1>
                                <p class="text-[10px] text-emerald-500 font-bold uppercase">Sistema Activo</p>
                            </div>
                        </div>
                        <button onclick="window.exitMode()" class="text-[10px] font-bold bg-slate-800 hover:bg-rose-900/20 hover:text-rose-400 px-4 py-2 rounded-full border border-slate-700 transition-all">SALIR</button>
                    </header>
                    <main id="cameraGrid" class="p-4 grid grid-cols-1 md:grid-cols-2 gap-6 max-w-6xl mx-auto w-full"></main>
                </div>`;
            lucide.createIcons();
            listenToCameras();
        }

        // --- LÓGICA WEB RTC (P2P) ---

        async function startCameraStream() {
            try {
                // Constraints específicos para mayor compatibilidad
                const constraints = { 
                    video: { 
                        facingMode: 'environment',
                        width: { ideal: 1280 },
                        height: { ideal: 720 }
                    }, 
                    audio: false 
                };
                
                activeStream = await navigator.mediaDevices.getUserMedia(constraints);
                const videoEl = document.getElementById('localVideo');
                videoEl.srcObject = activeStream;
                // Importante para Safari
                videoEl.play().catch(e => console.log("Auto-play blocked", e));
                
                const camRef = doc(db, 'artifacts', APP_ID, 'public', 'data', 'cameras', currentUser.uid);
                await setDoc(camRef, { 
                    accountId, 
                    name: 'Cam-' + currentUser.uid.substring(0,4).toUpperCase(), 
                    online: true, 
                    lastUpdate: serverTimestamp() 
                });

                // Escuchar solicitudes de conexión
                const offersCol = collection(db, 'artifacts', APP_ID, 'public', 'data', 'calls');
                onSnapshot(offersCol, async (snapshot) => {
                    snapshot.docChanges().forEach(async (change) => {
                        if (change.type === "added") {
                            const data = change.doc.data();
                            if (data.target === currentUser.uid && data.type === 'offer') {
                                handleOffer(data, change.doc.id);
                            }
                        }
                    });
                });
            } catch (e) { 
                alert("Error de cámara: " + e.message + ". Asegúrate de dar permisos en Safari."); 
            }
        }

        async function handleOffer(data, callId) {
            const pc = new RTCPeerConnection(iceServers);
            activeStream.getTracks().forEach(track => pc.addTrack(track, activeStream));

            pc.onicecandidate = (event) => {
                if (event.candidate) {
                    addDoc(collection(db, 'artifacts', APP_ID, 'public', 'data', `calls/${callId}/candidates`), event.candidate.toJSON());
                }
            };

            await pc.setRemoteDescription(new RTCSessionDescription(data.offer));
            const answer = await pc.createAnswer();
            await pc.setLocalDescription(answer);

            await setDoc(doc(db, 'artifacts', APP_ID, 'public', 'data', 'calls', callId), { 
                answer: { type: answer.type, sdp: answer.sdp }, 
                status: 'answered' 
            }, { merge: true });
        }

        function listenToCameras() {
            const camCol = collection(db, 'artifacts', APP_ID, 'public', 'data', 'cameras');
            onSnapshot(camCol, (snap) => {
                const grid = document.getElementById('cameraGrid');
                if(!grid) return;
                const cams = snap.docs.map(d => ({id: d.id, ...d.data()})).filter(c => c.accountId === accountId);
                
                grid.innerHTML = cams.map(c => `
                    <div class="cam-card bg-slate-900 rounded-3xl overflow-hidden relative border border-slate-800 shadow-xl aspect-video video-container">
                        <video id="video-${c.id}" autoplay playsinline webkit-playsinline class="w-full h-full object-cover"></video>
                        <div class="absolute inset-0 pointer-events-none border-t border-white/5"></div>
                        <div class="absolute top-4 left-4 bg-black/60 backdrop-blur-md px-3 py-1.5 rounded-full text-[10px] font-bold text-emerald-400 border border-emerald-500/20 flex items-center gap-2">
                             <div class="w-1.5 h-1.5 bg-emerald-500 rounded-full animate-ping"></div> ${c.name}
                        </div>
                    </div>
                `).join('') || '<div class="col-span-full text-center py-24 opacity-20 flex flex-col items-center"><i data-lucide="signal-low" class="w-12 h-12 mb-4"></i><p class="font-bold tracking-widest text-sm uppercase">Sincronizando cámaras...</p></div>';
                
                lucide.createIcons();
                cams.forEach(c => { if(c.id !== currentUser.uid) connectToCamera(c.id); });
            });
        }

        async function connectToCamera(camId) {
            if (peerConnections[camId]) return;
            const pc = new RTCPeerConnection(iceServers);
            peerConnections[camId] = pc;

            pc.ontrack = (event) => {
                const videoEl = document.getElementById(`video-${camId}`);
                if (videoEl && event.streams[0]) {
                    videoEl.srcObject = event.streams[0];
                    videoEl.play().catch(e => console.error("Error playing remote stream", e));
                }
            };

            const callRef = await addDoc(collection(db, 'artifacts', APP_ID, 'public', 'data', 'calls'), {
                sender: currentUser.uid,
                target: camId,
                type: 'offer',
                offer: null,
                timestamp: serverTimestamp()
            });

            pc.onicecandidate = (event) => {
                if (event.candidate) {
                    addDoc(collection(db, 'artifacts', APP_ID, 'public', 'data', `calls/${callRef.id}/candidates`), event.candidate.toJSON());
                }
            };

            const offer = await pc.createOffer();
            await pc.setLocalDescription(offer);
            await setDoc(callRef, { offer: { type: offer.type, sdp: offer.sdp } }, { merge: true });

            onSnapshot(callRef, (doc) => {
                const data = doc.data();
                if (data?.answer && pc.signalingState !== "stable") {
                    pc.setRemoteDescription(new RTCSessionDescription(data.answer));
                }
            });

            onSnapshot(collection(db, 'artifacts', APP_ID, 'public', 'data', `calls/${callRef.id}/candidates`), (snap) => {
                snap.docChanges().forEach(change => {
                    if (change.type === "added") pc.addIceCandidate(new RTCIceCandidate(change.doc.data())).catch(e => console.error(e));
                });
            });
        }

        // --- FUNCIONES GLOBALES ---
        window.join = () => { 
            accountId = document.getElementById('accInput').value.toUpperCase().trim(); 
            if(accountId.length >= 4) navigate(); 
        };
        
        window.setMode = (m) => { 
            mode = m; 
            navigate(); 
        };
        
        window.exitMode = async () => {
            if (mode === 'camera') {
                try {
                    await deleteDoc(doc(db, 'artifacts', APP_ID, 'public', 'data', 'cameras', currentUser.uid));
                } catch(e) {}
            }
            location.reload(); 
        };
        
        window.logout = () => { 
            accountId = ""; 
            mode = null; 
            navigate(); 
        };

        onAuthStateChanged(auth, (u) => { 
            currentUser = u; 
            if(!u) signInAnonymously(auth); 
            navigate(); 
        });

    </script>
</body>
</html>
