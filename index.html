<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CamViewer Pro - Sistema de Monitoreo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .video-overlay { background: linear-gradient(0deg, rgba(0,0,0,0.8) 0%, transparent 100%); }
        .recording-dot { animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
        video { background: #000; object-fit: cover; width: 100%; height: 100%; border-radius: 1rem; }
        .cam-card { transition: all 0.3s ease; position: relative; }
        .video-container { position: relative; overflow: hidden; border-radius: 1rem; background: #000; }
        .status-badge { backdrop-filter: blur(8px); background: rgba(0,0,0,0.6); }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen font-sans overflow-x-hidden">

    <div id="app">
        <div class="flex items-center justify-center min-h-screen">
            <div class="flex flex-col items-center gap-4">
                <div class="animate-spin rounded-full h-12 w-12 border-t-2 border-emerald-500"></div>
                <p class="text-slate-500 text-sm animate-pulse">Sincronizando seguridad...</p>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, collection, onSnapshot, deleteDoc, serverTimestamp, addDoc, query, where, getDocs, onSnapshotsInSync } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBpbTRTUWomLgUqnL46nepKnXZQIPRimlI",
            authDomain: "camaras-757d8.firebaseapp.com",
            projectId: "camaras-757d8",
            storageBucket: "camaras-757d8.firebasestorage.app",
            messagingSenderId: "370746294800",
            appId: "1:370746294800:web:77034554f64eee02aa8095"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const APP_ID = "camaras-757d8";

        let currentUser = null;
        let accountId = "";
        let mode = null;
        let activeStream = null;
        let peerConnections = {};

        // Servidores ICE mejorados
        const iceServers = { 
            iceServers: [
                { urls: "stun:stun.l.google.com:19302" },
                { urls: "stun:stun1.l.google.com:19302" },
                { urls: "stun:stun2.l.google.com:19302" },
                { urls: "stun:stun.services.mozilla.com" }
            ],
            iceCandidatePoolSize: 10
        };

        const appDiv = document.getElementById('app');

        function navigate() {
            if (!currentUser) return renderLoading();
            if (!accountId) return renderLogin();
            if (!mode) return renderModeSelection();
            mode === 'camera' ? renderCameraMode() : renderViewerMode();
        }

        function renderLoading() {
            appDiv.innerHTML = `<div class="flex items-center justify-center min-h-screen"><div class="animate-spin rounded-full h-12 w-12 border-t-2 border-emerald-500"></div></div>`;
        }

        function renderLogin() {
            appDiv.innerHTML = `
                <div class="min-h-screen flex items-center justify-center p-4">
                    <div class="bg-slate-900 p-8 rounded-3xl border border-slate-800 w-full max-w-md shadow-2xl">
                        <div class="flex justify-center mb-6 text-emerald-500"><i data-lucide="shield" class="w-16 h-16"></i></div>
                        <h1 class="text-3xl font-bold text-center mb-2 text-white tracking-tight">CamViewer Pro</h1>
                        <p class="text-slate-400 text-center mb-8 text-sm">Control Residencial Seguro</p>
                        <input id="accInput" type="text" placeholder="CÓDIGO DE RED" class="w-full bg-slate-950 border border-slate-700 p-4 rounded-xl mb-4 text-center text-2xl font-bold tracking-[0.3em] text-emerald-400 outline-none uppercase focus:border-emerald-500 transition-all">
                        <button onclick="window.join()" class="w-full bg-emerald-600 hover:bg-emerald-500 p-4 rounded-xl font-bold text-lg shadow-lg shadow-emerald-900/20 transition-all active:scale-95">ACCEDER AL PANEL</button>
                    </div>
                </div>`;
            lucide.createIcons();
        }

        function renderModeSelection() {
            appDiv.innerHTML = `
                <div class="min-h-screen flex flex-col items-center justify-center p-6 gap-6">
                    <div class="text-center mb-4">
                        <p class="text-slate-500 text-xs uppercase font-bold tracking-widest mb-1">Red Maestra</p>
                        <h2 class="text-3xl font-mono text-emerald-400 font-bold">${accountId}</h2>
                    </div>
                    <div class="grid grid-cols-1 gap-4 w-full max-w-sm">
                        <button id="btn-viewer" class="bg-slate-900 p-8 rounded-3xl border border-slate-800 hover:border-emerald-500 transition-all flex items-center gap-6 group">
                            <div class="bg-emerald-500/10 p-4 rounded-2xl group-hover:scale-110 transition-transform"><i data-lucide="monitor-smartphone" class="text-emerald-500 w-10 h-10"></i></div>
                            <div class="text-left"><p class="font-bold text-xl text-white">Visualizador</p><p class="text-xs text-slate-500">Modo Monitor</p></div>
                        </button>
                        <button id="btn-camera" class="bg-slate-900 p-8 rounded-3xl border border-slate-800 hover:border-rose-500 transition-all flex items-center gap-6 group">
                            <div class="bg-rose-500/10 p-4 rounded-2xl group-hover:scale-110 transition-transform"><i data-lucide="camera" class="text-rose-500 w-10 h-10"></i></div>
                            <div class="text-left"><p class="font-bold text-xl text-white">Transmisor</p><p class="text-xs text-slate-500">Modo Cámara</p></div>
                        </button>
                    </div>
                    <button onclick="window.logout()" class="mt-8 text-slate-500 hover:text-rose-400 transition-colors flex items-center gap-2 text-sm"><i data-lucide="log-out" class="w-4 h-4"></i> Desconectar</button>
                </div>`;
            lucide.createIcons();
            document.getElementById('btn-viewer').onclick = () => window.setMode('viewer');
            document.getElementById('btn-camera').onclick = () => window.setMode('camera');
        }

        function renderCameraMode() {
            appDiv.innerHTML = `
                <div class="min-h-screen bg-black flex flex-col relative overflow-hidden">
                    <video id="localVideo" autoplay playsinline webkit-playsinline muted class="w-full h-full object-cover"></video>
                    <div class="absolute inset-0 video-overlay p-8 flex flex-col justify-between pointer-events-none">
                        <div class="flex justify-between items-center">
                            <div class="flex items-center gap-3 status-badge px-4 py-2 rounded-full border border-white/10">
                                <div class="w-3 h-3 bg-rose-600 rounded-full recording-dot"></div>
                                <span class="text-white font-bold text-[10px] tracking-widest uppercase">Transmisión Activa</span>
                            </div>
                        </div>
                        <div class="flex justify-center pb-10 pointer-events-auto">
                            <button onclick="window.exitMode()" class="bg-white/10 p-8 rounded-full backdrop-blur-2xl border border-white/20 hover:bg-rose-600/40 transition-all active:scale-90">
                                <i data-lucide="power" class="text-white w-10 h-10"></i>
                            </button>
                        </div>
                    </div>
                </div>`;
            lucide.createIcons();
            startCameraStream();
        }

        function renderViewerMode() {
            appDiv.innerHTML = `
                <div class="min-h-screen flex flex-col">
                    <header class="p-4 bg-slate-900 border-b border-slate-800 flex justify-between items-center sticky top-0 z-50 backdrop-blur-xl bg-opacity-80">
                        <div class="flex items-center gap-3">
                            <div class="bg-emerald-500/20 p-2 rounded-lg"><i data-lucide="monitor" class="text-emerald-500 w-5 h-5"></i></div>
                            <h1 class="font-bold text-sm leading-tight tracking-tighter">RED: ${accountId}</h1>
                        </div>
                        <button onclick="window.exitMode()" class="text-[10px] font-bold bg-slate-800 px-4 py-2 rounded-full border border-slate-700 transition-all">SALIR</button>
                    </header>
                    <main id="cameraGrid" class="p-4 grid grid-cols-1 md:grid-cols-2 gap-6 max-w-6xl mx-auto w-full"></main>
                </div>`;
            lucide.createIcons();
            listenToCameras();
        }

        // --- LÓGICA WEB RTC ---

        async function startCameraStream() {
            try {
                activeStream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } }, 
                    audio: false 
                });
                const videoEl = document.getElementById('localVideo');
                videoEl.srcObject = activeStream;
                videoEl.play();
                
                const camRef = doc(db, 'artifacts', APP_ID, 'public', 'data', 'cameras', currentUser.uid);
                await setDoc(camRef, { accountId, name: 'Cámara Principal', online: true, lastUpdate: serverTimestamp() });

                onSnapshot(collection(db, 'artifacts', APP_ID, 'public', 'data', 'calls'), snapshot => {
                    snapshot.docChanges().forEach(change => {
                        if (change.type === "added" && change.doc.data().target === currentUser.uid) {
                            handleIncomingCall(change.doc.data(), change.doc.id);
                        }
                    });
                });
            } catch (e) { alert("Error cámara: " + e.message); }
        }

        async function handleIncomingCall(data, callId) {
            const pc = new RTCPeerConnection(iceServers);
            activeStream.getTracks().forEach(track => pc.addTrack(track, activeStream));

            pc.onicecandidate = event => {
                if (event.candidate) {
                    addDoc(collection(db, 'artifacts', APP_ID, 'public', 'data', `calls/${callId}/candidates`), event.candidate.toJSON());
                }
            };

            await pc.setRemoteDescription(new RTCSessionDescription(data.offer));
            const answer = await pc.createAnswer();
            await pc.setLocalDescription(answer);

            await setDoc(doc(db, 'artifacts', APP_ID, 'public', 'data', 'calls', callId), { 
                answer: { type: answer.type, sdp: answer.sdp } 
            }, { merge: true });
        }

        function listenToCameras() {
            const camCol = collection(db, 'artifacts', APP_ID, 'public', 'data', 'cameras');
            onSnapshot(camCol, (snap) => {
                const grid = document.getElementById('cameraGrid');
                if(!grid) return;
                const cams = snap.docs.map(d => ({id: d.id, ...d.data()})).filter(c => c.accountId === accountId);
                
                cams.forEach(c => {
                    if(!document.getElementById(`video-${c.id}`)) {
                        const card = document.createElement('div');
                        card.className = "cam-card bg-slate-900 rounded-3xl overflow-hidden border border-slate-800 shadow-xl aspect-video video-container";
                        card.innerHTML = `
                            <video id="video-${c.id}" autoplay playsinline webkit-playsinline muted class="w-full h-full object-cover"></video>
                            <div class="absolute top-4 left-4 status-badge px-3 py-1.5 rounded-full text-[10px] font-bold text-emerald-400 border border-emerald-500/20 flex items-center gap-2">
                                <div class="w-1.5 h-1.5 bg-emerald-500 rounded-full animate-ping"></div> ${c.name}
                            </div>
                            <button onclick="this.parentElement.querySelector('video').play()" class="absolute bottom-4 right-4 bg-white/10 p-2 rounded-full backdrop-blur-md opacity-0 hover:opacity-100 transition-opacity">
                                <i data-lucide="play" class="w-4 h-4 text-white"></i>
                            </button>
                        `;
                        grid.appendChild(card);
                        lucide.createIcons();
                        if(c.id !== currentUser.uid) connectToCamera(c.id);
                    }
                });
            });
        }

        async function connectToCamera(camId) {
            if (peerConnections[camId]) return;
            const pc = new RTCPeerConnection(iceServers);
            peerConnections[camId] = pc;

            pc.ontrack = event => {
                const videoEl = document.getElementById(`video-${camId}`);
                if (videoEl && event.streams[0]) {
                    videoEl.srcObject = event.streams[0];
                    videoEl.play().catch(() => {
                        console.log("Esperando interacción para reproducir...");
                    });
                }
            };

            const callRef = await addDoc(collection(db, 'artifacts', APP_ID, 'public', 'data', 'calls'), {
                sender: currentUser.uid,
                target: camId,
                type: 'offer',
                offer: null,
                timestamp: serverTimestamp()
            });

            pc.onicecandidate = event => {
                if (event.candidate) {
                    addDoc(collection(db, 'artifacts', APP_ID, 'public', 'data', `calls/${callRef.id}/candidates`), event.candidate.toJSON());
                }
            };

            const offer = await pc.createOffer();
            await pc.setLocalDescription(offer);
            await setDoc(callRef, { offer: { type: offer.type, sdp: offer.sdp } }, { merge: true });

            onSnapshot(callRef, doc => {
                const data = doc.data();
                if (data?.answer && pc.signalingState !== "stable") {
                    pc.setRemoteDescription(new RTCSessionDescription(data.answer));
                }
            });

            onSnapshot(collection(db, 'artifacts', APP_ID, 'public', 'data', `calls/${callRef.id}/candidates`), snap => {
                snap.docChanges().forEach(change => {
                    if (change.type === "added") pc.addIceCandidate(new RTCIceCandidate(change.doc.data())).catch(e => {});
                });
            });
        }

        window.join = () => { 
            accountId = document.getElementById('accInput').value.toUpperCase().trim(); 
            if(accountId.length >= 4) navigate(); 
        };
        window.setMode = (m) => { mode = m; navigate(); };
        window.exitMode = async () => {
            if (mode === 'camera') {
                try { await deleteDoc(doc(db, 'artifacts', APP_ID, 'public', 'data', 'cameras', currentUser.uid)); } catch(e) {}
            }
            location.reload(); 
        };
        window.logout = () => { accountId = ""; mode = null; navigate(); };

        onAuthStateChanged(auth, (u) => { 
            currentUser = u; 
            if(!u) signInAnonymously(auth); 
            navigate(); 
        });

    </script>
</body>
</html>
