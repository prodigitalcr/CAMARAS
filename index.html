<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CamViewer Ultra | PeerJS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { background-color: #020617; }
        .live-indicator { animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        video { width: 100%; height: 100%; object-fit: cover; background: #000; border-radius: 1rem; }
    </style>
</head>
<body class="text-slate-100 min-h-screen">

    <div id="app"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot, deleteDoc, collection, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // Tus credenciales originales
        const firebaseConfig = {
            apiKey: "AIzaSyBpbTRTUWomLgUqnL46nepKnXZQIPRimlI",
            authDomain: "camaras-757d8.firebaseapp.com",
            projectId: "camaras-757d8",
            storageBucket: "camaras-757d8.firebasestorage.app",
            messagingSenderId: "370746294800",
            appId: "1:370746294800:web:77034554f64eee02aa8095",
            measurementId: "G-491P4P2FD1"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const APP_ID = "camaras-757d8";

        let user = null;
        let accountId = "";
        let peer = null;
        let localStream = null;

        // --- INTERFAZ ---
        const renderLogin = () => {
            document.getElementById('app').innerHTML = `
            <div class="min-h-screen flex items-center justify-center p-6">
                <div class="w-full max-w-sm bg-slate-900 border border-slate-800 p-8 rounded-[2rem] text-center shadow-2xl">
                    <div class="flex justify-center mb-4 text-emerald-500"><i data-lucide="zap" class="w-12 h-12"></i></div>
                    <h1 class="text-2xl font-black mb-6 uppercase tracking-tighter">Peer-Stream Pro</h1>
                    <input id="accInput" type="text" placeholder="ID GRUPO (Ej: 1234)" class="w-full bg-black border border-slate-700 p-4 rounded-xl mb-4 text-center text-xl font-mono text-emerald-400 outline-none uppercase">
                    <button onclick="window.start('monitor')" class="w-full bg-slate-800 hover:bg-slate-700 p-4 rounded-xl font-bold mb-2 transition-all">MODO MONITOR</button>
                    <button onclick="window.start('camera')" class="w-full bg-emerald-600 hover:bg-emerald-500 p-4 rounded-xl font-bold transition-all">MODO EMISOR</button>
                </div>
            </div>`;
            lucide.createIcons();
        };

        // --- LÓGICA DE CÁMARA (EMISOR) ---
        async function runCamera() {
            document.getElementById('app').innerHTML = `
                <div class="h-screen flex flex-col p-4">
                    <video id="myVideo" autoplay playsinline muted class="flex-1 mirror"></video>
                    <div class="p-4 text-center">
                        <div class="inline-flex items-center gap-2 bg-rose-600 px-4 py-2 rounded-full mb-4">
                            <div class="w-2 h-2 bg-white rounded-full live-indicator"></div>
                            <span class="text-xs font-black uppercase">Transmitiendo en Vivo</span>
                        </div>
                        <button onclick="location.reload()" class="block w-full text-slate-500 text-xs font-bold uppercase">Detener</button>
                    </div>
                </div>`;
            
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
                document.getElementById('myVideo').srcObject = localStream;

                // Crear ID único para PeerJS
                const myPeerId = `peer-${APP_ID}-${user.uid}`;
                peer = new Peer(myPeerId);

                peer.on('open', async (id) => {
                    // PUBLICAR EN FIRESTORE (Siguiendo tus reglas)
                    await setDoc(doc(db, 'artifacts', APP_ID, 'public', 'data', 'cameras', user.uid), {
                        accountId: accountId,
                        peerId: id,
                        active: true,
                        timestamp: serverTimestamp()
                    });
                });

                // Responder cuando el monitor llame
                peer.on('call', (call) => {
                    call.answer(localStream);
                });

            } catch (err) {
                alert("Error de cámara: " + err.message);
            }
        }

        // --- LÓGICA DE MONITOR (RECEPTOR) ---
        function runMonitor() {
            document.getElementById('app').innerHTML = `
                <div class="p-4">
                    <div class="flex justify-between items-center mb-6">
                        <h2 class="text-xs font-black uppercase text-slate-500 tracking-widest">Monitor: ${accountId}</h2>
                        <button onclick="location.reload()" class="text-[10px] bg-slate-800 px-3 py-1 rounded-lg">SALIR</button>
                    </div>
                    <div id="videoGrid" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div class="col-span-full text-center py-20 opacity-20 font-bold uppercase text-xs tracking-[0.5em]">Esperando Señal...</div>
                    </div>
                </div>`;
            
            peer = new Peer(); // ID aleatorio para el monitor

            const camsRef = collection(db, 'artifacts', APP_ID, 'public', 'data', 'cameras');
            const calls = new Set();

            onSnapshot(camsRef, (snapshot) => {
                const grid = document.getElementById('videoGrid');
                
                snapshot.docs.forEach(d => {
                    const data = d.data();
                    if (data.accountId === accountId && !calls.has(data.peerId)) {
                        calls.add(data.peerId);
                        
                        // Crear elemento de video
                        const container = document.createElement('div');
                        container.className = "relative bg-black rounded-2xl overflow-hidden aspect-video border border-white/5";
                        container.innerHTML = `<video id="v-${data.peerId}" autoplay playsinline></video>
                        <div class="absolute bottom-3 left-3 bg-black/50 px-2 py-1 rounded text-[10px] font-bold uppercase">Cámara Activa</div>`;
                        
                        if (grid.innerText.includes('Esperando')) grid.innerHTML = '';
                        grid.appendChild(container);

                        // LLAMAR A LA CÁMARA
                        const call = peer.call(data.peerId, new MediaStream());
                        call.on('stream', (remoteStream) => {
                            document.getElementById(`v-${data.peerId}`).srcObject = remoteStream;
                        });
                    }
                });
            });
        }

        // --- ACCIONES ---
        window.start = (m) => {
            accountId = document.getElementById('accInput').value.toUpperCase().trim();
            if (accountId.length < 3) return alert("ID muy corto");
            m === 'camera' ? runCamera() : runMonitor();
        };

        onAuthStateChanged(auth, (u) => {
            user = u;
            if (!u) signInAnonymously(auth);
            else renderLogin();
        });

    </script>
</body>
</html>
