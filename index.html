    <style>
        :root { --glass-bg: rgba(15, 23, 42, 0.6); --glass-border: rgba(255, 255, 255, 0.1); }
        body { background-color: #020617; font-family: system-ui, -apple-system, sans-serif; overflow-x: hidden; }
        
        /* Animaciones y utilidades */
        .live-indicator { animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.4; transform: scale(1.1); } }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        
        .glass-panel { background: var(--glass-bg); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid var(--glass-border); }
        .glass-button { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(8px); transition: all 0.2s; }
        .glass-button:active { transform: scale(0.95); background: rgba(255,255,255,0.1); }
        
        canvas { display: none; }
        .camera-feed { width: 100%; height: 100%; object-fit: cover; transition: filter 0.3s ease; }
        
        /* Scrollbar oculta */
        ::-webkit-scrollbar { width: 0px; }
        
        /* Rangos personalizados */
        input[type=range] { -webkit-appearance: none; background: transparent; width: 100%; margin: 10px 0; }
        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 6px; cursor: pointer; background: rgba(255,255,255,0.1); border-radius: 10px; }
        input[type=range]::-webkit-slider-thumb { border: 2px solid #10b981; height: 16px; width: 16px; border-radius: 50%; background: #020617; cursor: pointer; -webkit-appearance: none; margin-top: -5px; }

        .night-mode-filter { filter: sepia(1) hue-rotate(80deg) saturate(300%) brightness(1.2) contrast(1.2) !important; }
    </style>
</head>

        // ==========================================
        // LÓGICA DE BROADCAST (CÁMARA TRANSMISORA)
        // ==========================================
        async function startBroadcasting() {
            try {
                activeStream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: currentFacingMode, width: { ideal: 480 }, height: { ideal: 360 } }, 
                    audio: false 
                });
                const video = document.getElementById('v-preview');
                video.srcObject = activeStream;

                const canvas = document.getElementById('procCanvas');
                const ctx = canvas.getContext('2d');
                const camRef = doc(db, 'artifacts', APP_ID, 'public', 'data', 'cameras', user.uid);

                // Check flash support
                const track = activeStream.getVideoTracks()[0];
                if(track && track.getCapabilities && track.getCapabilities().torch) {
                    document.getElementById('cam-flash-btn').classList.remove('hidden');
                }

                await setDoc(camRef, {
                    accountId,
                    name: 'Cam-' + user.uid.substring(0,4).toUpperCase(),
                    flash: false,
                    requestedFacingMode: currentFacingMode
                }, { merge: true });

                // BUCLE DE TRANSMISIÓN DE ALTA FLUIDEZ (~12-15 FPS = 80ms)
                // Se comprime fuertemente a JPEG 0.3 para cuidar el ancho de banda y Firebase
                streamInterval = setInterval(async () => {
                    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                    const base64Frame = canvas.toDataURL('image/jpeg', 0.3); 
                    
                    // Calcular Telemetría
                    frameCount++;
                    byteCount += base64Frame.length;
                    const now = Date.now();
                    if (now - lastFrameTime >= 1000) {
                        document.getElementById('telemetry-fps').innerText = frameCount;
                        document.getElementById('telemetry-kbps').innerText = Math.round((byteCount * 0.75) / 1024) + ' KB/s';
                        frameCount = 0; byteCount = 0; lastFrameTime = now;
                    }

                    try {
                        await updateDoc(camRef, { frame: base64Frame, lastSeen: serverTimestamp(), telemetry: { fps: document.getElementById('telemetry-fps').innerText, kbps: document.getElementById('telemetry-kbps').innerText } });
                    } catch (e) {
                        if(e.code === 'not-found') window.stopCamera(true);
                    }
                }, 80);

                // ESCUCHA DE COMANDOS REMOTOS
                cameraUnsubscribe = onSnapshot(camRef, async (snap) => {
                    if(!snap.exists()) { window.stopCamera(true); return; }
                    const data = snap.data();
                    
                    // Flash Remoto
                    if(data.flash !== undefined && data.flash !== currentFlashState) {
                        currentFlashState = data.flash;
                        applyFlash(currentFlashState);
                    }

                    // Lente Remoto
                    if(data.requestedFacingMode && data.requestedFacingMode !== currentFacingMode) {
                        window.flipCamera(data.requestedFacingMode);
                    }

                    // Sirena Remota
                    if(data.sirenTrigger && data.sirenTrigger !== window.lastSirenTrigger) {
                        window.lastSirenTrigger = data.sirenTrigger;
                        playLoudSiren();
                    }

                    // Audio Remoto (Walkie-Talkie)
                    if(data.audioTimestamp && data.audioTimestamp !== window.lastAudioTimestamp) {
                        window.lastAudioTimestamp = data.audioTimestamp;
                        if(data.audioChunk) {
                            const audio = new Audio(data.audioChunk);
                            audio.play().catch(e => console.log("Audio bloqueado por navegador", e));
                        }
                    }
                });

            } catch (err) {
                alert("Error: Activa los permisos de cámara en tu navegador.");
                window.setMode(null);
            }
        }

        function applyFlash(enable) {
            if(!activeStream) return;
            const track = activeStream.getVideoTracks()[0];
            if(track && track.getCapabilities && track.getCapabilities().torch) {
                track.applyConstraints({ advanced: [{ torch: enable }] }).catch(e => {});
            }
        }

        window.toggleLocalFlash = () => {
            currentFlashState = !currentFlashState;
            applyFlash(currentFlashState);
            updateDoc(doc(db, 'artifacts', APP_ID, 'public', 'data', 'cameras', user.uid), { flash: currentFlashState });
        };

        window.flipCamera = async (forceMode = null) => {
            currentFacingMode = forceMode || (currentFacingMode === 'environment' ? 'user' : 'environment');
            if(activeStream) activeStream.getTracks().forEach(t => t.stop());
            clearInterval(streamInterval);
            if(cameraUnsubscribe) cameraUnsubscribe();
            
            // Actualizar modo solicitado para evitar bucles
            await updateDoc(doc(db, 'artifacts', APP_ID, 'public', 'data', 'cameras', user.uid), { requestedFacingMode: currentFacingMode });
            await startBroadcasting();
        }

        window.stopCamera = async (kicked = false) => {
            clearInterval(streamInterval);
            if(cameraUnsubscribe) cameraUnsubscribe();
            if(activeStream) activeStream.getTracks().forEach(t => t.stop());
            if (user && !kicked) await deleteDoc(doc(db, 'artifacts', APP_ID, 'public', 'data', 'cameras', user.uid));
            if (kicked) alert("Has sido desconectado de la red.");
            location.reload();
        };

        function playLoudSiren() {
            if(!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'square';
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.frequency.setValueAtTime(400, audioCtx.currentTime);
            osc.frequency.linearRampToValueAtTime(1200, audioCtx.currentTime + 0.5);
            osc.frequency.linearRampToValueAtTime(400, audioCtx.currentTime + 1.0);
            osc.frequency.linearRampToValueAtTime(1200, audioCtx.currentTime + 1.5);
            osc.frequency.linearRampToValueAtTime(400, audioCtx.currentTime + 2.0);
            gain.gain.setValueAtTime(1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 2.0);
            osc.start();
            osc.stop(audioCtx.currentTime + 2.0);
        }

        // ==========================================
        // LÓGICA DE MONITOR (VISUALIZADOR)
        // ==========================================
        function startMonitoring() {
            const streamsCol = collection(db, 'artifacts', APP_ID, 'public', 'data', 'cameras');
            
            onSnapshot(streamsCol, (snapshot) => {
                const list = document.getElementById('camList');
                if (!list && !activeModalCamId) return;

                const activeStreams = snapshot.docs.map(d => ({id: d.id, ...d.data()})).filter(s => s.accountId === accountId);

                // --- ACTUALIZAR MODAL SI ESTÁ ABIERTO ---
                if (activeModalCamId) {
                    const camData = activeStreams.find(s => s.id === activeModalCamId);
                    if (camData) {
                        const modalImg = document.getElementById('modal-feed');
                        if (modalImg) modalImg.src = camData.frame || '';
                        document.getElementById('modal-fps').innerText = camData.telemetry?.fps || '0';
                        document.getElementById('modal-kbps').innerText = camData.telemetry?.kbps || '0 KB/s';
                        
                        // Sincronizar UI de flash
                        const btnFlash = document.getElementById('btn-flash');
                        if(camData.flash) { btnFlash.classList.add('text-yellow-400'); btnFlash.classList.remove('text-slate-400'); }
                        else { btnFlash.classList.remove('text-yellow-400'); btnFlash.classList.add('text-slate-400'); }

                        // Grabación en Modal
                        if(recorders[activeModalCamId] && camData.frame) {
                            const imgObj = new Image();
                            imgObj.onload = () => recorders[activeModalCamId].ctx.drawImage(imgObj, 0, 0, 640, 480);
                            imgObj.src = camData.frame;
                        }
                    } else {
                        // La cámara se desconectó mientras estaba en fullscreen
                        window.closeModal();
                    }
                }

                // --- ACTUALIZAR CUADRÍCULA ---
                if (list) {
                    const emptyState = document.getElementById('empty-state');
                    if (activeStreams.length === 0) {
                        if(!emptyState) list.innerHTML = `<div class="col-span-full py-32 text-center opacity-30 flex flex-col items-center" id="empty-state"><div class="relative mb-4"><i data-lucide="radar" class="w-16 h-16 animate-spin-slow" style="animation-duration: 3s;"></i><div class="absolute inset-0 bg-emerald-500/20 rounded-full blur-xl"></div></div><p class="text-xs font-bold uppercase tracking-[0.3em]">Esperando cámaras...</p></div>`;
                        lucide.createIcons();
                        return;
                    }
                    if(emptyState) emptyState.remove();

                    // Eliminar tarjetas viejas
                    const currentIds = activeStreams.map(c => `cam-grid-${c.id}`);
                    Array.from(list.children).forEach(child => {
                        if (child.id && !currentIds.includes(child.id)) { child.remove(); }
                    });

                    // Dibujar tarjetas
                    activeStreams.forEach(s => {
                        const cardId = `cam-grid-${s.id}`;
                        let card = document.getElementById(cardId);
                        const displayName = s.customName || s.name;
                        
                        if (!card) {
                            card = document.createElement('div');
                            card.id = cardId;
                            card.className = "video-container shadow-[0_10px_30px_rgba(0,0,0,0.5)] border border-slate-800 group relative cursor-pointer hover:border-emerald-500/50 transition-colors";
                            card.onclick = () => window.openModal(s.id, displayName);
                            
                            card.innerHTML = `
                                <img id="feed-grid-${s.id}" class="camera-feed" />
                                <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-transparent to-transparent pointer-events-none"></div>
                                <div class="absolute top-4 left-4 flex items-center gap-2 glass-panel px-3 py-1.5 rounded-full border border-white/10 pointer-events-none">
                                    <div class="w-1.5 h-1.5 bg-emerald-500 rounded-full live-indicator"></div>
                                    <span id="name-grid-${s.id}" class="text-[10px] font-black uppercase tracking-tighter text-white"></span>
                                </div>
                                <div class="absolute inset-0 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity bg-black/40 backdrop-blur-sm pointer-events-none">
                                    <div class="bg-emerald-500/20 p-4 rounded-full border border-emerald-500/50 text-emerald-400">
                                        <i data-lucide="maximize" class="w-8 h-8"></i>
                                    </div>
                                </div>
                            `;
                            list.appendChild(card);
                            lucide.createIcons({root: card});
                        }
                        // Update src
                        document.getElementById(`feed-grid-${s.id}`).src = s.frame || '';
                        document.getElementById(`name-grid-${s.id}`).innerText = displayName;
                    });
                }
            });
        }

        // ==========================================
        // FUNCIONES DE PANTALLA COMPLETA & CONTROLES
        // ==========================================
        window.openModal = (camId, camName) => {
            activeModalCamId = camId;
            document.getElementById('modal-cam-name').innerText = camName;
            
            // Iniciar configuración visual local
            if(!camSettings[camId]) camSettings[camId] = { zoom: 1, rotation: 0, brightness: 100, contrast: 100, nightMode: false };
            const s = camSettings[camId];
            
            document.getElementById('zoom-slider').value = s.zoom;
            document.getElementById('bright-slider').value = s.brightness;
            window.applyImageSettings();

            // Set UI toggles
            if(s.nightMode) document.getElementById('btn-night').classList.add('text-emerald-400');
            else document.getElementById('btn-night').classList.remove('text-emerald-400');

            const modal = document.getElementById('fullScreenModal');
            modal.classList.remove('hidden');
            setTimeout(() => modal.classList.remove('opacity-0'), 10);
        };

        window.closeModal = () => {
            const modal = document.getElementById('fullScreenModal');
            modal.classList.add('opacity-0');
            setTimeout(() => { modal.classList.add('hidden'); activeModalCamId = null; }, 300);
        };

        window.applyImageSettings = () => {
            if(!activeModalCamId) return;
            const s = camSettings[activeModalCamId];
            s.zoom = document.getElementById('zoom-slider').value;
            s.brightness = document.getElementById('bright-slider').value;
            
            const img = document.getElementById('modal-feed');
            img.style.transform = `scale(${s.zoom}) rotate(${s.rotation}deg)`;
            
            if (s.nightMode) {
                img.style.filter = `sepia(1) hue-rotate(80deg) saturate(300%) brightness(${s.brightness/100 + 0.3}) contrast(1.4)`;
            } else {
                img.style.filter = `brightness(${s.brightness}%)`;
            }
        };

        window.actionRotateLocally = () => {
            if(!activeModalCamId) return;
            camSettings[activeModalCamId].rotation = (camSettings[activeModalCamId].rotation + 90) % 360;
            window.applyImageSettings();
        };

        window.toggleNightMode = () => {
            if(!activeModalCamId) return;
            const s = camSettings[activeModalCamId];
            s.nightMode = !s.nightMode;
            const btn = document.getElementById('btn-night');
            s.nightMode ? btn.classList.add('text-emerald-400') : btn.classList.remove('text-emerald-400');
            window.applyImageSettings();
        };

        window.actionRemoteFlip = async () => {
            if(!activeModalCamId) return;
            const ref = doc(db, 'artifacts', APP_ID, 'public', 'data', 'cameras', activeModalCamId);
            const snap = await getDoc(ref);
            if(snap.exists()) {
                const newMode = snap.data().requestedFacingMode === 'environment' ? 'user' : 'environment';
                await updateDoc(ref, { requestedFacingMode: newMode });
            }
        };

        window.actionRemoteFlash = async () => {
            if(!activeModalCamId) return;
            const ref = doc(db, 'artifacts', APP_ID, 'public', 'data', 'cameras', activeModalCamId);
            const snap = await getDoc(ref);
            if(snap.exists()) await updateDoc(ref, { flash: !snap.data().flash });
        };

        window.actionSiren = async () => {
            if(!activeModalCamId) return;
            await updateDoc(doc(db, 'artifacts', APP_ID, 'public', 'data', 'cameras', activeModalCamId), { sirenTrigger: Date.now() });
        };

        window.actionPhoto = () => {
            if(!activeModalCamId) return;
            const img = document.getElementById('modal-feed');
            if(!img || !img.src) return;
            const link = document.createElement('a');
            link.href = img.src;
            link.download = `Captura_Cam_${new Date().getTime()}.jpg`;
            link.click();
        };

        // Grabación
        window.actionToggleRecording = () => {
            if(!activeModalCamId) return;
            const camId = activeModalCamId;
            const btn = document.getElementById('btn-record');
            const badge = document.getElementById('recording-badge');
            
            if(recorders[camId]) {
                recorders[camId].recorder.stop();
                delete recorders[camId];
                btn.classList.remove('text-red-500');
                badge.classList.add('hidden');
                badge.classList.remove('flex');
            } else {
                const canvas = document.createElement('canvas');
                canvas.width = 640; canvas.height = 480;
                const ctx = canvas.getContext('2d');
                
                const stream = canvas.captureStream(4);
                const recorder = new MediaRecorder(stream, { mimeType: 'video/webm' });
                const chunks = [];
                
                recorder.ondataavailable = e => chunks.push(e.data);
                recorder.onstop = () => {
                    const blob = new Blob(chunks, { type: 'video/webm' });
                    const url = URL.createObjectURL(blob);
                    const link = document.createElement('a');
                    link.href = url;
                    link.download = `Video_Cam_${new Date().getTime()}.webm`;
                    link.click();
                };
                
                recorder.start();
                recorders[camId] = { recorder, canvas, ctx };
                btn.classList.add('text-red-500');
                badge.classList.remove('hidden');
                badge.classList.add('flex');
            }
        };

        // Walkie-Talkie (Audio PTT)
        window.startWalkie = async () => {
            if(!activeModalCamId) return;
            const btn = document.getElementById('btn-walkie');
            btn.classList.add('text-white', 'scale-110');
            
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                walkieRecorder = new MediaRecorder(stream);
                walkieChunks = [];
                walkieRecorder.ondataavailable = e => walkieChunks.push(e.data);
                walkieRecorder.onstop = async () => {
                    const blob = new Blob(walkieChunks, { type: 'audio/webm' });
                    const reader = new FileReader();
                    reader.readAsDataURL(blob);
                    reader.onloadend = async () => {
                        const base64Audio = reader.result;
                        await updateDoc(doc(db, 'artifacts', APP_ID, 'public', 'data', 'cameras', activeModalCamId), {
                            audioChunk: base64Audio,
                            audioTimestamp: Date.now()
                        });
                    }
                    stream.getTracks().forEach(t => t.stop());
                };
                walkieRecorder.start();
            } catch(e) { alert("Permiso de micrófono denegado."); }
        };

        window.stopWalkie = () => {
            const btn = document.getElementById('btn-walkie');
            btn.classList.remove('text-white', 'scale-110');
            if(walkieRecorder && walkieRecorder.state === 'recording') {
                walkieRecorder.stop();
            }
        };

        // Compartir por WhatsApp / Web Share
        window.actionShare = async () => {
            if(!activeModalCamId) return;
            const img = document.getElementById('modal-feed');
            if(!img || !img.src) return;

            try {
                // Convertir Base64 a Blob
                const res = await fetch(img.src);
                const blob = await res.blob();
                const file = new File([blob], "alerta_seguridad.jpg", { type: "image/jpeg" });

                if (navigator.canShare && navigator.canShare({ files: [file] })) {
                    await navigator.share({
                        title: 'Alerta CamViewer Pro',
                        text: 'Mira esta captura de mi cámara de seguridad.',
                        files: [file]
                    });
                } else {
                    // Fallback para escritorio
                    window.open(`https://api.whatsapp.com/send?text=Alerta%20de%20Seguridad.%20Guarda%20la%20imagen%20y%20compártela.`);
                }
            } catch (error) { console.error("Error compartiendo", error); }
        };

        // Acciones globales
        window.setAccount = () => {
            const input = document.getElementById('accInput').value.toUpperCase().trim();
            if (input.length >= 4) { accountId = input; render(); }
        };

        window.setMode = (m) => { mode = m; render(); };
        window.logout = () => { location.reload(); };

        // --- AUTH ---
        onAuthStateChanged(auth, (u) => {
            user = u;
            if (!u) signInAnonymously(auth);
            else render();
        });

    </script>
</body>
</html>
