<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CamViewer Pro - Sistema de Monitoreo</title>
    <!-- Tailwind para diseño profesional instantáneo -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide para Iconos -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .video-overlay { background: linear-gradient(0deg, rgba(0,0,0,0.8) 0%, transparent 100%); }
        .recording-dot { animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen">

    <div id="app">
        <!-- El contenido se genera dinámicamente aquí -->
        <div class="flex items-center justify-center min-h-screen">
            <div class="animate-spin rounded-full h-12 w-12 border-t-2 border-emerald-500"></div>
        </div>
    </div>

    <script type="module">
        // Importación de módulos de Firebase desde CDN
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, collection, onSnapshot, deleteDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // TUS CREDENCIALES CONFIGURADAS
        const firebaseConfig = {
            apiKey: "AIzaSyBpbTRTUWomLgUqnL46nepKnXZQIPRimlI",
            authDomain: "camaras-757d8.firebaseapp.com",
            projectId: "camaras-757d8",
            storageBucket: "camaras-757d8.firebasestorage.app",
            messagingSenderId: "370746294800",
            appId: "1:370746294800:web:77034554f64eee02aa8095"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const APP_COLLECTION_ID = "camaras-757d8"; // Vinculado a tus reglas

        let currentUser = null;
        let accountId = "";
        let mode = null; // 'viewer' | 'camera'
        let activeStream = null;

        const appDiv = document.getElementById('app');

        // Función para cambiar de "pantalla"
        function navigate() {
            if (!currentUser) {
                renderLoading();
                return;
            }
            if (!accountId) {
                renderLogin();
                return;
            }
            if (!mode) {
                renderModeSelection();
                return;
            }
            if (mode === 'camera') {
                renderCameraMode();
            } else {
                renderViewerMode();
            }
        }

        function renderLoading() {
            appDiv.innerHTML = `<div class="flex items-center justify-center min-h-screen"><div class="animate-spin rounded-full h-12 w-12 border-t-2 border-emerald-500"></div></div>`;
        }

        function renderLogin() {
            appDiv.innerHTML = `
                <div class="min-h-screen flex items-center justify-center p-4">
                    <div class="bg-slate-900 p-8 rounded-3xl border border-slate-800 w-full max-w-md shadow-2xl">
                        <div class="flex justify-center mb-6 text-emerald-500"><i data-lucide="shield" class="w-16 h-16"></i></div>
                        <h1 class="text-3xl font-bold text-center mb-2 text-white">CamViewer Pro</h1>
                        <p class="text-slate-400 text-center mb-8 text-sm">Ingresa un código para tu grupo de cámaras</p>
                        <input id="accInput" type="text" placeholder="CÓDIGO DE CUENTA" class="w-full bg-slate-950 border border-slate-700 p-4 rounded-xl mb-4 text-center text-2xl font-bold tracking-widest text-emerald-400 outline-none focus:border-emerald-500 transition-all uppercase">
                        <button onclick="window.join()" class="w-full bg-emerald-600 hover:bg-emerald-500 p-4 rounded-xl font-bold text-lg shadow-lg shadow-emerald-900/20 transition-all">ACCEDER</button>
                    </div>
                </div>`;
            lucide.createIcons();
        }

        function renderModeSelection() {
            appDiv.innerHTML = `
                <div class="min-h-screen flex flex-col items-center justify-center p-6 gap-6">
                    <div class="text-center mb-4">
                        <p class="text-slate-500 text-xs uppercase font-bold tracking-widest">Cuenta Activa</p>
                        <h2 class="text-2xl font-mono text-emerald-400 font-bold">${accountId}</h2>
                    </div>
                    <button onclick="window.setMode('viewer')" class="w-full max-w-sm bg-slate-900 p-8 rounded-3xl border border-slate-800 hover:border-emerald-500 transition-all flex items-center gap-6 group">
                        <div class="bg-emerald-500/10 p-4 rounded-2xl group-hover:scale-110 transition-transform"><i data-lucide="monitor-smartphone" class="text-emerald-500 w-10 h-10"></i></div>
                        <div class="text-left">
                            <p class="font-bold text-xl text-white">Visualizador</p>
                            <p class="text-sm text-slate-400">Ver cámaras de esta cuenta</p>
                        </div>
                    </button>
                    <button onclick="window.setMode('camera')" class="w-full max-w-sm bg-slate-900 p-8 rounded-3xl border border-slate-800 hover:border-rose-500 transition-all flex items-center gap-6 group">
                        <div class="bg-rose-500/10 p-4 rounded-2xl group-hover:scale-110 transition-transform"><i data-lucide="camera" class="text-rose-500 w-10 h-10"></i></div>
                        <div class="text-left">
                            <p class="font-bold text-xl text-white">Modo Cámara</p>
                            <p class="text-sm text-slate-400">Usar este móvil como cámara</p>
                        </div>
                    </button>
                    <button onclick="window.logout()" class="mt-4 text-slate-500 hover:text-white transition-colors">Cambiar Código</button>
                </div>`;
            lucide.createIcons();
        }

        function renderCameraMode() {
            appDiv.innerHTML = `
                <div class="min-h-screen bg-black flex flex-col relative overflow-hidden">
                    <video id="cameraPreview" autoplay playsinline muted class="absolute inset-0 w-full h-full object-cover opacity-80"></video>
                    <div class="absolute inset-0 video-overlay p-8 flex flex-col justify-between">
                        <div class="flex justify-between items-center">
                            <div class="flex items-center gap-2">
                                <div class="w-3 h-3 bg-rose-600 rounded-full recording-dot"></div>
                                <span class="text-rose-600 font-bold tracking-widest text-sm">EN VIVO</span>
                            </div>
                            <div class="bg-black/40 px-3 py-1 rounded-full border border-white/10 text-xs font-mono">RED: ${accountId}</div>
                        </div>
                        <div class="text-center">
                            <button onclick="window.exitMode()" class="bg-white/10 p-6 rounded-full backdrop-blur-xl border border-white/20 hover:bg-rose-600/20 transition-all">
                                <i data-lucide="power" class="text-white w-8 h-8"></i>
                            </button>
                            <p class="mt-4 text-slate-300 text-sm font-medium">Transmitiendo a la cuenta maestra</p>
                        </div>
                    </div>
                </div>`;
            lucide.createIcons();
            startCameraStream();
        }

        function renderViewerMode() {
            appDiv.innerHTML = `
                <div class="min-h-screen flex flex-col">
                    <header class="p-4 bg-slate-900/50 border-b border-slate-800 backdrop-blur-md flex justify-between items-center sticky top-0 z-10">
                        <div class="flex items-center gap-2">
                            <i data-lucide="shield" class="text-emerald-500 w-5 h-5"></i>
                            <h1 class="font-bold">Monitor: ${accountId}</h1>
                        </div>
                        <button onclick="window.exitMode()" class="text-xs bg-slate-800 px-3 py-1.5 rounded-lg border border-slate-700">Cerrar</button>
                    </header>
                    <main id="cameraGrid" class="p-4 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                        <!-- Aquí se inyectan las cámaras en tiempo real -->
                    </main>
                </div>`;
            lucide.createIcons();
            listenToCameras();
        }

        // --- FUNCIONES DE LÓGICA ---

        window.join = () => {
            accountId = document.getElementById('accInput').value.toUpperCase();
            if(accountId.length >= 4) navigate();
        };

        window.setMode = (m) => {
            mode = m;
            navigate();
        };

        window.exitMode = () => {
            if(activeStream) activeStream.getTracks().forEach(t => t.stop());
            mode = null;
            navigate();
        };

        window.logout = () => {
            accountId = "";
            mode = null;
            navigate();
        };

        async function startCameraStream() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: 'environment' },
                    audio: false 
                });
                activeStream = stream;
                document.getElementById('cameraPreview').srcObject = stream;
                
                // Registro en Firebase
                const camDoc = doc(db, 'artifacts', APP_COLLECTION_ID, 'public', 'data', 'cameras', currentUser.uid);
                await setDoc(camDoc, {
                    accountId: accountId,
                    name: 'Cámara ' + currentUser.uid.substring(0,4),
                    online: true,
                    timestamp: serverTimestamp()
                });
            } catch (e) {
                alert("Error al acceder a la cámara. Revisa los permisos.");
                window.exitMode();
            }
        }

        function listenToCameras() {
            const camCol = collection(db, 'artifacts', APP_COLLECTION_ID, 'public', 'data', 'cameras');
            onSnapshot(camCol, (snap) => {
                const grid = document.getElementById('cameraGrid');
                if(!grid) return;

                const cams = snap.docs.map(d => ({id: d.id, ...d.data()}))
                                .filter(c => c.accountId === accountId);

                let html = "";
                // Renderizar hasta 5 ranuras
                for(let i=0; i<5; i++) {
                    const c = cams[i];
                    if(c) {
                        html += `
                        <div class="aspect-video bg-slate-900 rounded-2xl border border-emerald-500/50 relative overflow-hidden flex flex-col items-center justify-center shadow-lg shadow-emerald-950/20">
                            <div class="absolute inset-0 bg-emerald-500/5 animate-pulse"></div>
                            <i data-lucide="video" class="text-emerald-500/40 w-12 h-12 mb-2"></i>
                            <p class="font-bold text-emerald-400 text-sm tracking-widest">${c.name.toUpperCase()}</p>
                            <div class="absolute top-3 right-3 flex items-center gap-1.5 bg-black/60 px-2 py-1 rounded-full border border-emerald-500/30 text-[9px] font-bold">
                                <div class="w-1.5 h-1.5 bg-emerald-500 rounded-full animate-ping"></div> VIVO
                            </div>
                        </div>`;
                    } else {
                        html += `
                        <div class="aspect-video bg-slate-900/30 rounded-2xl border border-slate-800 flex flex-col items-center justify-center text-slate-700">
                            <i data-lucide="video-off" class="w-8 h-8 mb-2 opacity-20"></i>
                            <span class="text-[10px] font-bold uppercase tracking-tighter opacity-30">Ranura ${i+1} Disponible</span>
                        </div>`;
                    }
                }
                grid.innerHTML = html;
                lucide.createIcons();
            });
        }

        // Inicializar Autenticación
        onAuthStateChanged(auth, (u) => {
            currentUser = u;
            if(!u) {
                signInAnonymously(auth);
            }
            navigate();
        });

    </script>
</body>
</html>
